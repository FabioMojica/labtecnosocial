<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950">
  <defs>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #222; }
      .box-title { font: 700 14px Arial, sans-serif; fill: #111; }
      .box-text { font: 12px Arial, sans-serif; fill: #222; }
      .box { fill: #f7f9fc; stroke: #2b2b2b; stroke-width: 1.2; }
      .link { stroke: #444; stroke-width: 1.2; fill: none; }
      .link-dashed { stroke: #666; stroke-width: 1.2; fill: none; stroke-dasharray: 6 4; }
      .pk { font-weight: 700; }
      .note { font: 11px Arial, sans-serif; fill: #666; }
    </style>
  </defs>

  <text class="title" x="40" y="36">Modelo de datos - Sistema Lab Tecno Social</text>

  <!-- Left column -->
  <rect class="box" x="40" y="70" width="320" height="150" rx="8"/>
  <text class="box-title" x="56" y="95">strategic_plans</text>
  <text class="box-text pk" x="56" y="115">id (PK)</text>
  <text class="box-text" x="56" y="133">year</text>
  <text class="box-text" x="56" y="151">mission</text>
  <text class="box-text" x="56" y="169">plan_version</text>
  <text class="box-text" x="56" y="187">created_at, updated_at</text>

  <rect class="box" x="40" y="250" width="320" height="140" rx="8"/>
