  <text class="box-text pk" x="56" y="465">id (PK)</text>
  <text class="box-text" x="56" y="483">amount</text>
  <text class="box-text" x="56" y="501">concept</text>
  <text class="box-text" x="56" y="519">objective_id (FK)</text>

  <rect class="box" x="40" y="580" width="320" height="130" rx="8"/>
  <text class="box-title" x="56" y="605">programs</text>
  <text class="box-text pk" x="56" y="625">id (PK)</text>
  <text class="box-text" x="56" y="643">description</text>
  <text class="box-text" x="56" y="661">objective_id (FK)</text>

