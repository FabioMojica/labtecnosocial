  <text class="box-text pk" x="936" y="515">id (PK)</text>
  <text class="box-text" x="936" y="533">firstName, lastName</text>
  <text class="box-text" x="936" y="551">role, email</text>
  <text class="box-text" x="936" y="569">state, session_version</text>
  <text class="box-text" x="936" y="587">created_by (FK)</text>
  <text class="box-text" x="936" y="605">created_at, updated_at</text>

  <rect class="box" x="520" y="620" width="360" height="150" rx="8"/>
  <text class="box-title" x="536" y="645">reports</text>
  <text class="box-text pk" x="536" y="665">id (PK)</text>
  <text class="box-text" x="536" y="683">title</text>
  <text class="box-text" x="536" y="701">data (jsonb)</text>
  <text class="box-text" x="536" y="719">report_version</text>
  <text class="box-text" x="536" y="737">created_at, updated_at</text>

  <!-- Links -->
  <path class="link" d="M360 145 L520 200" />
  <path class="link" d="M200 250 L200 220" />
  <path class="link" d="M200 390 L200 420" />
  <path class="link" d="M200 550 L200 580" />

  <path class="link" d="M360 305 L520 230" />
  <path class="link" d="M360 640 L520 230" />

  <path class="link" d="M700 330 L700 360" />
  <path class="link" d="M880 220 L920 220" />
  <path class="link" d="M880 260 L920 360" />
  <path class="link" d="M880 240 L920 380" />

  <path class="link" d="M1090 440 L1090 470" />
  <path class="link-dashed" d="M1090 470 C 1100 430, 1160 430, 1180 470" />

  <!-- Notes -->
  <text class="note" x="520" y="800">Nota: reports se almacena como JSONB sin relacion directa.</text>
